<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transfers — Chuka Premier League</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="site-header"></div>

<main>
  <span class="eyebrow">Transfer Window</span>
  <h1>Transfer Announcements</h1>
  <p>Official player moves between teams, posted by the league admin.</p>

  <div class="panel">
    <div style="display:flex;gap:12px;flex-wrap:wrap;">
      <div style="flex:1;min-width:140px;">
        <label>League</label>
        <select id="transfers-league-filter">
          <option value="">All</option>
          <option value="A">League A</option>
          <option value="B">League B</option>
        </select>
      </div>
      <div style="flex:1;min-width:140px;">
        <label>Team</label>
        <select id="transfers-team-filter"><option value="">All</option></select>
      </div>
    </div>
  </div>

  <div id="transfers-list"><p class="loading">Loading transfer announcements…</p></div>
</main>

<div id="site-footer"></div>

<script src="data.js"></script>
<script src="layout.js"></script>
<script src="transfers.js"></script>
<script>
  mountLayout('transfers.html');
  initTransfersPage();
</script>
</body>
</html>
